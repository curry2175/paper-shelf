services:
  - type: web
    name: paper-shelf
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        sync: false
      - key: NCBI_EMAIL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: NCBI_TOOL_NAME
        value: paper_shelf_django
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com
