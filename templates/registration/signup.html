{% extends 'base.html' %}
{% block title %}회원가입 — Paper Shelf{% endblock %}
{% block content %}
<section class="auth-card">
  <p class="eyebrow">START YOUR SHELF</p>
  <h1>회원가입</h1>
  <p class="muted">
    현재 버전은 일반 계정으로 시작하며, 다음 단계에서 Google 로그인을 연결합니다.
  </p>
  <form method="post" class="stack-form">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="button primary" type="submit">책장 만들기</button>
  </form>
</section>
{% endblock %}
