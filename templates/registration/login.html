{% extends 'base.html' %}
{% block title %}로그인 — Paper Shelf{% endblock %}
{% block content %}
<section class="auth-card">
  <p class="eyebrow">WELCOME BACK</p>
  <h1>로그인</h1>
  <form method="post" class="stack-form">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="button primary" type="submit">로그인</button>
  </form>
  <p class="muted">계정이 없나요? <a href="{% url 'signup' %}">회원가입</a></p>
</section>
{% endblock %}
